<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="url(#gradient)" opacity="0.1"/>
  
  <!-- Z Shape with modern styling -->
  <g filter="url(#glow)">
    <!-- Top horizontal line -->
    <rect x="14" y="16" width="36" height="6" rx="3" fill="url(#gradient)"/>
    
    <!-- Diagonal line -->
    <path d="M46 22 L18 42" stroke="url(#gradient)" stroke-width="6" stroke-linecap="round"/>
    
    <!-- Bottom horizontal line -->
    <rect x="14" y="42" width="36" height="6" rx="3" fill="url(#gradient)"/>
  </g>
  
  <!-- AI circuit pattern -->
  <g opacity="0.6" fill="none" stroke="#4F46E5" stroke-width="1.5">
    <circle cx="20" cy="20" r="2" fill="#4F46E5"/>
    <circle cx="44" cy="20" r="2" fill="#4F46E5"/>
    <circle cx="20" cy="44" r="2" fill="#4F46E5"/>
    <circle cx="44" cy="44" r="2" fill="#4F46E5"/>
    
    <!-- Connecting lines -->
    <path d="M22 20 L28 20 M36 20 L42 20"/>
    <path d="M22 44 L28 44 M36 44 L42 44"/>
    <path d="M20 22 L20 28 M20 36 L20 42"/>
    <path d="M44 22 L44 28 M44 36 L44 42"/>
  </g>
</svg>